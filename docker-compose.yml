version: '3.8'

services:
  ats-resume-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats-resume-analyzer
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ats-data:/app/ats-backend/data
      - ats-uploads:/app/ats-backend/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ats-data:
  ats-uploads:
